<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="../imgs/xicara-fav-icon.png" type="image/png">
    <title>Coffe Break Shop</title>
    <script src="script.js"></script>
</head>
<body>
    <header>
        <img id="img_logo" src="../imgs/header/xicara-logo.png" alt="Icone logo Coffe Break">
        <nav>
            <a href="#">Produtos</a>
            <a href="#">Categorias</a>
            <a href="#">Ofertas</a>
            <a href="#">Sobre Nós</a>

        </nav>
        <div id="div_imgs_menu">
            <img class="img_header" src="../imgs/header/carrinho.png" alt="Icone da Sacola">
            <img class="img_header" src="../imgs/header/user.png" alt="Icone User">
        </div>
    </header>
    <main>
        <section id="section_main">
            <div id ="texto_main">
                <h1>Coffe Break<br>Shop</h1>
                <p>
                    Precisa de um break do estudo ou trabalho?<br>
                    Tudo que você precisa para um <strong>coffe break</strong> está aqui.
                </p>
            </div>

            <div id="div_imgs_section">
                <div style="display: flex;">
                    <div class="div_section_maior" >
                        <img id="img_mesa" class="img_section_maior"   src="../imgs/img_section/mesa_cafe.png" alt="Mesa com café">
                    </div>
        
                    <div class="div_section_menor" >
                        <img id="img_computadores" class="img_section_menor"  src="../imgs/img_section/computadores.jpg" alt="Imagem de pessoas em computadores">
                    </div>
                </div>

                <div style="display: flex;">
                    <div class="div_section_menor">
                        <img id="img_alunos"  class="img_section_menor" src="../imgs/img_section/alunos.png" alt="Alunos estudando">
                    </div>
    
                    <div class="div_section_maior">
                        <img  id="img_baralho" class="img_section_maior" src="../imgs/img_section/baralho.jpg" alt="Baralho">
                    </div>
                </div>
                
               
            </div>
            
        </section>
        
    </main>

</body>
</html>
