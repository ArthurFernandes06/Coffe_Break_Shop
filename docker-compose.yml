services:
  db:
    image: postgres:15
    container_name: coffee-db-container
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=LACB@123
      - POSTGRES_DB=coffeebreak
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql