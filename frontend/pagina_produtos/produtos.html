<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - Coffe Break Shop</title>
    <link rel="stylesheet" href="produtos.css">
</head>

<body>
    <!-- HEADER IGUAL O DA PAGINA INICIAL -->
    <header>
        <img id="img_logo" src="../imgs/pagina_inicial/header/xicara-logo.png" alt="Icone logo Coffe Break">
        <nav>
            <a href="#">Produtos</a>
            <a href="#">Categorias</a>
            <a href="#">Ofertas</a>
            <a href="#">Sobre Nós</a>
        </nav>
        <div id="div_imgs_menu">
            <div id="carrinho-icon-wrapper" title="Ver carrinho">
                <img class="img_header" src="../imgs/pagina_inicial/header/carrinho.png" alt="Icone da Sacola">
                <span id="carrinho-badge">0</span>
            </div>
            <img class="img_header" src="../imgs/pagina_inicial/header/user.png" alt="Icone User">
        </div>
    </header>

    <!-- CONTEUDO PRINCIPAL (MAIN) DA PAGINA DE PRODUTOS -->
    <main>
        <div class="container-produtos">
            <h1 class="titulo-pagina">Nosso Menu</h1>

            <!-- Sessão de Filtros -->
            <section class="filtros">
                <input type="text" id="busca-nome" placeholder="Buscar produto...">
                <select id="filtro-categoria">
                    <option value="todos">Todos</option>
                    <option value="cafes">Cafés</option>
                    <option value="doces">Doces</option>
                    <option value="salgados">Salgados</option>
                </select>
            </section>

            <!-- Grid Responsivo de Produtos -->
            <section class="grid-produtos" id="lista-produtos">
                <!-- Produto Exemplo: Café -->
                <article class="card-produto" data-categoria="cafes">
                    <img src="../imgs/produtos/produto_01.png" alt="Café com zap" class="img-produto"
                        onerror="this.src='https://placehold.co/200x150/A59376/503D1F?text=Cafe'">
                    <div class="info-produto">
                        <h2 class="nome-produto">Café com zap</h2>
                        <p class="preco-produto">R$ 5,00</p>
                        <button class="btn-adicionar">Adicionar</button>
                    </div>
                </article>

                <!-- Produto Exemplo: Doce -->
                <article class="card-produto" data-categoria="doces">
                    <img src="../imgs/produtos/exemplo_doce.jpg" alt="Brownie de Chocolate" class="img-produto"
                        onerror="this.src='https://placehold.co/200x150/A59376/503D1F?text=Doce'">
                    <div class="info-produto">
                        <h2 class="nome-produto">Brownie de Chocolate</h2>
                        <p class="preco-produto">R$ 12,00</p>
                        <button class="btn-adicionar">Adicionar</button>
                    </div>
                </article>

                <!-- Produto Exemplo: Salgado -->
                <article class="card-produto" data-categoria="salgados">
                    <img src="../imgs/produtos/exemplo_salgado.jpg" alt="PÃo de Queijo" class="img-produto"
                        onerror="this.src='https://placehold.co/200x150/A59376/503D1F?text=Salgado'">
                    <div class="info-produto">
                        <h2 class="nome-produto">Pão de Queijo</h2>
                        <p class="preco-produto">R$ 4,50</p>
                        <button class="btn-adicionar">Adicionar</button>
                    </div>
                </article>

                <!-- Outro Café -->
                <article class="card-produto" data-categoria="cafes">
                    <img src="../imgs/produtos/produto02.png" alt="Café com copas" class="img-produto"
                        onerror="this.src='https://placehold.co/200x150/A59376/503D1F?text=Café'">
                    <div class="info-produto">
                        <h2 class="nome-produto">Café com copas</h2>
                        <p class="preco-produto">R$ 8,00</p>
                        <button class="btn-adicionar">Adicionar</button>
                    </div>
                </article>
            </section>
        </div>
    </main>

    <!-- OVERLAY DO PAINEL DO CARRINHO -->
    <div id="carrinho-overlay" class="carrinho-overlay"></div>

    <!-- PAINEL LATERAL DO CARRINHO -->
    <aside id="carrinho-painel" class="carrinho-painel">
        <div class="carrinho-painel-header">
            <h2>Seu Carrinho</h2>
            <button id="carrinho-fechar" class="carrinho-fechar" aria-label="Fechar carrinho">&times;</button>
        </div>
        <div id="carrinho-lista" class="carrinho-lista">
            <!-- Itens do carrinho serão inseridos via JS -->
        </div>
        <div class="carrinho-painel-footer">
            <div class="carrinho-total">
                <span>Total:</span>
                <span id="carrinho-total-valor">R$ 0,00</span>
            </div>
            <button id="btn-finalizar" class="btn-finalizar">Finalizar Pedido</button>
        </div>
    </aside>

    <!-- Script da página de produtos -->
    <script src="produtos.js"></script>
</body>

</html>
