<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Página do usuário</title>
</head>
<body> 
    <header>
        <img id="img_logo" src="../imgs/pagina_inicial/header/xicara-logo.png" alt="Icone logo Coffe Break">
        <nav>
            <a href="#">Produtos</a>
            <a href="#">Categorias</a>
            <a href="#">Ofertas</a>
            <a href="#">Sobre Nós</a>
            
        </nav>
        <div id="div_imgs_menu">
            <img class="img_header" src="../imgs/pagina_inicial/header/carrinho.png" alt="Icone da Sacola">
            <img class="img_header" src="../imgs/pagina_inicial/header/user.png" alt="Icone User">
        </div>
    </header>
    <main>
        <!-- <section id="welcome_section">
            <div id="main_title">
                <h1>Boas vindas (User)!</h1>
                <h2>Hora de dar um break do trabalho?</h2>
            </div>
        </section>
         -->
        <aside>
            <nav>
                <a href="#" data-section="perfil">Meu Perfil</a>
                <a href="#" data-section="atividade">Minha atividade</a>
                <a href="#" data-section="carrinho">Carrinho de compras</a>
                <a href="#" data-section="configuracoes">Configurações</a>
                <a href="#" data-section="sair">Sair</a>    
            </nav>
        </aside>
        
        <section id="perfil" class="pagina">
                <h2>Meu Perfil:</h2>
                <form>
                    <p id="exibir-nome">Caio</p>
                    <button id="btn-editar-nome">Editar</button>
                    <label for="input-nome" style="display: none">Nome</label>
                    <input type="text" id="input-nome" value="Caio" style="display: none">
                    <button id="btn-salvar-nome" style="display: none">Salvar</button>

                    <p id="exibir-sobrenome">Ribeiro</p>
                    <button id="btn-editar-sobrenome">Editar</button>
                    <label for="input-sobrenome" style="display: none">Sobrenome</label>
                    <input type="text" id="input-sobrenome" value="Ribeiro" style="display: none">
                    <button id="btn-salvar-sobrenome" style="display: none">Salvar</button>

                    <p id="exibir-endereco">Rua G</p>
                    <button id="btn-editar-endereco">Editar</button>
                    <label for="input-endereco" style="display: none">Endereço</label>
                    <input type="text" id="input-endereco" value="Rua G" style="display: none">
                    <button id="btn-salvar-endereco" style="display: none">Salvar</button>
                </form>
            </section>

            <section id="atividade" class="pagina">
                <h2>Minha atividade</h2>
                <!-- Conteúdo: Total de pedidos/Último pedido/Histórico de pedidos/...-->
            </section>
            
            <section id="carrinho" class="pagina">
                <h2>Carrinho de compras</h2>
                <!-- Todo o carrinho de compras e preço total-->
            </section>

            <section id="configuracoes" class="pagina">
                <h2>Configurações</h2>
                <!-- Mudar email/Mudar senha/Notifiicações/Excluir conta-->
            </section>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
